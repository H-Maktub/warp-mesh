services:
  warp:
    network_mode: host
    container_name: cf-warp
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./warp-data:/var/lib/cloudflare-warp
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    restart: always
    image: hmaktub/warp:latest
